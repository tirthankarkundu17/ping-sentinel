version: "3.9"

services:
  backend:
    build: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: /data/monitoring.db
      JWT_SECRET: super_secret_change_me
      ALLOWED_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data

  worker:
    build: ./worker
    environment:
      DATABASE_URL: /data/monitoring.db
      WORKER_POLL_INTERVAL_SECONDS: 30
    volumes:
      - sqlite_data:/data
    depends_on:
      - backend

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
